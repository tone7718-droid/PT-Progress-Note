name: CI

# 푸시 / PR 마다 lint + 타입 검사 + Vitest 실행.
# tauri/android 빌드는 릴리즈 시에만 (release-desktop / release-android).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
