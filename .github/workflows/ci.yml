name: CI

# 푸시 / PR 마다 lint + 타입 검사 + Vitest 실행.
# tauri/android 빌드는 릴리즈 시에만 (release-desktop / release-android).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      # 정적 export 빌드까지 검증 — 타입/린트는 통과해도 export 단계에서
      # 깨지는 회귀(정적 생성 오류 등)를 CI 에서 잡기 위함
      - run: npm run build
