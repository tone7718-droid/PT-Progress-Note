name: Release Android (Capacitor APK)

# Capacitor Android 빌드 — 디버그 APK 를 workflow artifact 로만 업로드 (내부 QA용).
# 디버그 서명 APK 는 debuggable + 공개 디버그 키 서명이라 공개 Release 에 첨부하지 않는다.
# 공개 배포용 서명 릴리즈 APK 는 keystore secret 등록 후 아래 주석 블록을 활성화할 것.
#
# 트리거:
#   - workflow_dispatch — 수동

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "릴리즈 태그 (예: v0.1.7)"
        required: true

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (next export)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android (debug APK)
        run: ./gradlew assembleDebug
        working-directory: android

      # 릴리즈 APK 가 필요하면 keystore secret 을 등록하고 아래 블록을 활성화:
      #   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      #   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      # - name: Decode keystore
      #   run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
      # - name: Build Android (release APK, signed)
      #   env:
      #     ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      #     ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      #     ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
      #   run: ./gradlew assembleRelease
      #   working-directory: android

      # 디버그 APK 는 내부 확인용 artifact 로만 보관 (공개 Release 첨부 금지 —
      # debuggable 빌드 + 공용 디버그 키 서명은 재서명/변조에 취약).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pt-note-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 서명 릴리즈 APK 를 Release 에 첨부하려면 keystore secret 등록 후
      # 위의 assembleRelease 블록과 함께 아래를 활성화:
      # - name: Attach signed APK to release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ inputs.tag }}
      #     files: android/app/build/outputs/apk/release/app-release.apk
